name: Sync to Gitee

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync code & tags to Gitee
        env:
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -e
          REMOTE="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
          git remote add gitee "$REMOTE" 2>/dev/null || git remote set-url gitee "$REMOTE"
          echo "Push main branch..."
          git push gitee main --force
          echo "Push all tags..."
          git push gitee --tags --force
          echo "OK"

      - name: Sync release assets to Gitee
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -e

          # Collect existing Gitee releases
          EXISTING=$(curl -sS \
            "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN&per_page=100" \
            | jq -r '.[] | "\(.tag_name) \(.id)"')

          declare -A EXISTING_MAP
          while IFS=' ' read -r tag id; do
            [ -n "$tag" ] && [ -n "$id" ] && EXISTING_MAP["$tag"]="$id"
          done <<< "$EXISTING"

          sync_one() {
            local tag="$1" name="$2" body="$3" prerelease="$4" assets_json="$5"

            if [ -n "${EXISTING_MAP[$tag]}" ]; then
              echo "Skip $tag (exists on Gitee)"
              return
            fi

            echo "Creating Gitee release $tag ..."
            # Gitee requires non-empty body
            local safe_body="${body:-AirNovel $tag 版本发布}"
            PAYLOAD=$(jq -n \
              --arg at "$GITEE_TOKEN" \
              --arg tag "$tag" \
              --arg name "$name" \
              --arg body "$safe_body" \
              --argjson pre "$prerelease" \
              '{access_token: $at, tag_name: $tag, name: $name, body: $body, prerelease: $pre, target_commitish: "main"}')

            RESP=$(curl -sS -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases")
            RID=$(echo "$RESP" | jq -r '.id // empty')

            if [ -z "$RID" ]; then
              echo "FAIL - API response:"
              echo "$RESP" | jq .
              return
            fi

            echo "$assets_json" | jq -c '.[]' 2>/dev/null | while read -r asset; do
              aname=$(echo "$asset" | jq -r '.name // empty')
              aurl=$(echo "$asset" | jq -r '.url // .downloadUrl // empty')
              [ -z "$aname" ] || [ -z "$aurl" ] && continue
              echo "Upload $aname ..."
              curl -sS -L -o "/tmp/$aname" "$aurl"
              curl -sS -X POST \
                -F "file=@/tmp/$aname" \
                "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases/$RID/attach_files?access_token=$GITEE_TOKEN" > /dev/null
              rm -f "/tmp/$aname"
            done
          }

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            NAME=$(jq -r '.release.name' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.release.body' "$GITHUB_EVENT_PATH")
            PRE=$(jq -r '.release.prerelease' "$GITHUB_EVENT_PATH")
            ASSETS=$(jq -c '[.release.assets[] | {name, url: .browser_download_url}]' "$GITHUB_EVENT_PATH")
            sync_one "$TAG" "$NAME" "$BODY" "$PRE" "$ASSETS"
          else
            # Iterate over all git tags (not just GitHub Releases)
            for tag in $(git tag --sort=-version:refname); do
              [ -z "$tag" ] && continue
              # Try to get GitHub Release details, fallback to tag-only
              if DETAILS=$(gh release view "$tag" --json name,body,isPrerelease,assets 2>/dev/null); then
                n=$(echo "$DETAILS" | jq -r '.name')
                b=$(echo "$DETAILS" | jq -r '.body')
                p=$(echo "$DETAILS" | jq -r '.isPrerelease')
                a=$(echo "$DETAILS" | jq -c '[.assets[] | {name, url: (.url // .downloadUrl)}]')
              else
                # Fallback: tag name only, no assets
                n="$tag"
                b=""
                p="false"
                a="[]"
              fi
              sync_one "$tag" "$n" "$b" "$p" "$a"
            done
          fi
