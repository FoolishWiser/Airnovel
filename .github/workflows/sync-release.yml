name: Sync to Gitee

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>/dev/null || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sync code & tags to Gitee
        env:
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -e
          REMOTE="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
          git remote add gitee "$REMOTE" 2>/dev/null || git remote set-url gitee "$REMOTE"
          echo "Push main branch..."
          git push gitee main --force
          echo "Push all tags..."
          git push gitee --tags --force
          echo "OK"

      - name: Build APK & Sync releases to Gitee
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USER: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -e

          # Delete all existing Gitee releases first (to fix order)
          echo "Clearing existing Gitee releases..."
          for rid in $(curl -fsS --connect-timeout 15 --max-time 120 \
            "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN&per_page=100" \
            | jq -r '.[].id'); do
            [ -z "$rid" ] && continue
            curl -fsS --connect-timeout 15 --max-time 60 -X DELETE \
              "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases/$rid?access_token=$GITEE_TOKEN" > /dev/null
            echo "  Deleted release id=$rid"
          done

          echo "Existing tags file will be created after rebuild"

          create_release() {
            local tag="$1" name="$2" body="$3" prerelease="$4"
            local safe_body="${body:-AirNovel $tag 版本发布}"

            echo "Creating Gitee release $tag ..."
            PAYLOAD=$(jq -n \
              --arg at "$GITEE_TOKEN" \
              --arg tag "$tag" \
              --arg name "$name" \
              --arg body "$safe_body" \
              --argjson pre "${prerelease:-false}" \
              '{access_token: $at, tag_name: $tag, name: $name, body: $body, prerelease: $pre, target_commitish: "main"}')

            RESP=$(curl -fsS --connect-timeout 15 --max-time 120 -X POST \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases")
            RID=$(echo "$RESP" | jq -r '.id // empty')

            if [ -z "$RID" ]; then
              echo "FAIL - API response:"
              echo "$RESP" | jq .
              return
            fi

            # Upload pre-built APK if available
            local apk="/tmp/airnovel-${tag}.apk"
            if [ -f "$apk" ]; then
              echo "Uploading APK ..."
              curl -fsS --connect-timeout 30 --max-time 300 -X POST \
                -F "file=@$apk" \
                "https://gitee.com/api/v5/repos/$GITEE_USER/$GITEE_REPO/releases/$RID/attach_files?access_token=$GITEE_TOKEN" \
                | jq -r '.name // "Upload done"' || echo "Upload failed for $tag"
            fi
          }

          build_apk() {
            local tag="$1"
            echo "::group::Building APK for $tag"
            git checkout "$tag" 2>/dev/null
            gradle :app:assembleDebug --no-daemon 2>&1 || echo "Build failed for $tag"
            if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
              cp "app/build/outputs/apk/debug/app-debug.apk" "/tmp/airnovel-${tag}.apk"
              echo "APK ready for $tag"
            else
              echo "No APK for $tag"
            fi
            git checkout main 2>/dev/null
            echo "::endgroup::"
          }

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            NAME=$(jq -r '.release.name' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.release.body' "$GITHUB_EVENT_PATH")
            PRE=$(jq -r '.release.prerelease' "$GITHUB_EVENT_PATH")
            build_apk "$TAG"
            create_release "$TAG" "$NAME" "$BODY" "$PRE"
          else
            for tag in $(git tag | sort -V); do
              [ -z "$tag" ] && continue
              if DETAILS=$(gh release view "$tag" --json name,body,isPrerelease 2>/dev/null); then
                n=$(echo "$DETAILS" | jq -r '.name')
                b=$(echo "$DETAILS" | jq -r '.body')
                p=$(echo "$DETAILS" | jq -r '.isPrerelease')
              else
                n="$tag"; b=""; p="false"
              fi
              build_apk "$tag"
              create_release "$tag" "$n" "$b" "$p"
            done
          fi
